<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EverSafe Chimney Operations Suite</title>
    <style>
        :root { --primary: #0f172a; --accent: #F28C28; --bg: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background-color: var(--primary); display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; color: white; text-align: center; }
        .login-card { background: white; color: #0f172a; width: 100%; max-width: 420px; padding: 35px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { font-size: 24px; margin-bottom: 5px; }
        p { color: #64748b; font-size: 14px; margin-bottom: 25px; }
        input[type="password"] { width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 6px; font-size: 16px; margin-top: 5px; text-align: center; outline: none; }
        input[type="password"]:focus { border-color: var(--accent); background-color: #fdfcfa; }
        .btn-unlock { width: 100%; background-color: var(--accent); color: white; font-weight: bold; padding: 14px; border: none; border-radius: 6px; text-transform: uppercase; font-size: 14px; cursor: pointer; margin-top: 20px; transition: background 0.2s; }
        .btn-unlock:hover { background-color: #d97706; }
        .error-line { color: #ef4444; font-size: 13px; font-weight: bold; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>EverSafe Chimney</h2>
        <p>Enterprise Operations Suite v6.5</p>
        <div style="text-align: left;">
            <label style="font-size:11px; font-weight:bold; color:#1e293b; text-transform:uppercase; letter-spacing:0.5px;">Enter Crew Access Key:</label>
            <input type="password" id="passkeyField" placeholder="••••••••">
        </div>
        <button type="button" class="btn-unlock" onclick="authenticateFieldCrewShift()">Unlock System Dashboard</button>
        <div id="loginErrorMsg" class="error-line"></div>
    </div>

    <script>
        var GOOGLE_API_GATEWAY_URL = "https://script.google.com/macros/s/AKfycbzoSNXWLdMSN2PcMM-QfkmXiZQaO00YD1r_eNdfZ45EMjL48DtX8H_2turxhb_nPLteMA/exec";

        window.addEventListener('DOMContentLoaded', function() {
            var sessionActive = localStorage.getItem('eversafe_session_active');
            var cachedUser = localStorage.getItem('eversafe_authenticated_user');
            if (sessionActive === 'true' && cachedUser) {
                window.location.replace("contract-wo.html");
            } else {
                document.getElementById('passkeyField').focus();
            }
        });

        async function authenticateFieldCrewShift() {
            var inputKey = document.getElementById('passkeyField').value;
            var errorMsg = document.getElementById('loginErrorMsg');
            errorMsg.style.display = "none";
            
            try {
                let response = await fetch(GOOGLE_API_GATEWAY_URL, {
                    method: "POST",
                    redirect: "follow",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ route: "verifyUserPasscode", passkey: inputKey })
                });
                let result = await response.json();
                
                if(result.success) {
                    localStorage.setItem('eversafe_authenticated_user', result.authorizedUser);
                    localStorage.setItem('eversafe_session_active', 'true');
                    window.location.assign("contract-wo.html");
                } else {
                    errorMsg.innerText = result.error; errorMsg.style.display = "block";
                }
            } catch (err) {
                errorMsg.innerText = "Connection Error: Network Endpoint Offline."; errorMsg.style.display = "block";
            }
        }
    </script>
</body>
</html>
